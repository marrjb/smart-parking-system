<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>Automatic Parking Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
 </head>

 <body>
  <header>
   <h1>Automatic Parking System</h1>
   <div id="clock">--:--:--</div>
  </header>

  <div class="container">
   <div class="dashboard">
    <div class="card">
     <h2>Distance Sensor</h2>
     <p id="distance">-- cm</p>
    </div>
    <div class="card">
     <h2>Gate Status</h2>
     <p id="gate">---</p>
    </div>
    <div class="card rgb-card">
     <h2>RGB Status</h2>
     <div class="rgb-wrapper">
      <div id="rgb-dot"></div>
      <p id="rgb">---</p>
     </div>
    </div>
   </div>
  </div>

 	<footer>
   Amar Jamil • XII-K2 • SMK Al Falah Bandung • UJIKOM
  </footer>

  <script type="module">
   // Import the functions you need from the SDKs you need
   import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
   import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
   // TODO: Add SDKs for Firebase products that you want to use
   // https://firebase.google.com/docs/web/setup#available-libraries

   // Your web app's Firebase configuration
   const firebaseConfig = {
    apiKey: "AIzaSyCIvFbmlT5P6zoECCN2XzRQ5T_SipI_Wu8",
    authDomain: "ujikom-a89f7.firebaseapp.com",
    databaseURL: "https://ujikom-a89f7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ujikom-a89f7",
    storageBucket: "ujikom-a89f7.firebasestorage.app",
    messagingSenderId: "275682159538",
    appId: "1:275682159538:web:4ba53daffecb2fec2a52ab"
   };

   // Initialize Firebase
   const app = initializeApp(firebaseConfig);  // Jalankan Firebase
   const db = getDatabase(app);   // Ambil database

   // Realtime
   function updateClock() {
    const now = new Date();  // Ambil waktu sekarang
    document.getElementById("clock").innerHTML =
     now.toLocaleDateString() + " • " + now.toLocaleTimeString();  // Tampilkan tanggal + jam
    }
    setInterval(updateClock, 1000);  // Update tiap 1 detik
    updateClock();

    // ================= REFERENSI FIREBASE =================
    const distanceRef = ref(db, "smart_parking/distance");  // Path jarak
    const gateRef = ref(db, "smart_parking/gate");  // Path status gate
    const rgbRef = ref(db, "smart_parking/rgb");  // Path warna RGB

    // ================= DISTANCE =================
    onValue(distanceRef, (snap) => {
     let d = snap.val();  // Ambil nilai dari firebase
     console.log("Distance:", d);  // Debug di console
     document.getElementById("distance").innerText = d + " cm";  // Tampilkan ke UI
    });

    // ================= GATE =================
    onValue(gateRef, (snap) => {
     let g = snap.val();  // Ambil data
     console.log("Gate:", g);
     document.getElementById("gate").innerText = g;  // Tampilkan status
    });

    // ================= RGB / WARNA UI =================
    onValue(rgbRef, (snap) => {
     let color = snap.val();  // Ambil warna dari Firebase
      console.log("RGB:", color);
      document.getElementById("rgb").innerText = color;  // Tampilkan teks warna
      let cards = document.querySelectorAll(".card");  // Ambil semua card
      let dot = document.getElementById("rgb-dot");  // Ambil dot warna

      // Reset warna default
      cards.forEach(c => c.style.borderColor = "#334155");
      dot.style.background = "#334155";
      // Jika hijau
      if (color == "GREEN") {
       cards.forEach(c => c.style.borderColor = "#16a34a");  // Border hijau
       dot.style.background = "#16a34a";  // Dot hijau
      }
      // Jika merah
      if (color == "RED") {
       cards.forEach(c => c.style.borderColor = "#dc2626");  // Border merah
       dot.style.background = "#dc2626";
      }// Jika biru
      if (color == "BLUE") {
       cards.forEach(c => c.style.borderColor = "#2563eb");  // Bprder biru
       dot.style.background = "#2563eb";
      }
    });
  </script>
 </body>
</html>
